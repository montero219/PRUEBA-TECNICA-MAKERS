name: Security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "23 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: 8.0.x
  CONFIGURATION: Release
  IMAGE_NAME: atlas-pars

jobs:
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual

      - name: Restore projects
        run: |
          dotnet restore src/Atlas.PARS.Api/Atlas.PARS.Api.csproj
          dotnet restore tests/Atlas.PARS.PruebasUnitarias/Atlas.PARS.PruebasUnitarias.csproj
          dotnet restore tests/Atlas.PARS.PruebasIntegracion/Atlas.PARS.PruebasIntegracion.csproj

      - name: Build projects
        run: |
          dotnet build src/Atlas.PARS.Api/Atlas.PARS.Api.csproj --configuration ${{ env.CONFIGURATION }} --no-restore
          dotnet build tests/Atlas.PARS.PruebasUnitarias/Atlas.PARS.PruebasUnitarias.csproj --configuration ${{ env.CONFIGURATION }} --no-restore
          dotnet build tests/Atlas.PARS.PruebasIntegracion/Atlas.PARS.PruebasIntegracion.csproj --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  source-and-dependencies:
    name: Trivy SCA, secrets and source scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

  docker-image:
    name: Docker image scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build local image
        run: docker build --file deploy/docker/Dockerfile --tag ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          scanners: vuln,secret,misconfig
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

  iac:
    name: Checkov IaC scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect Terraform files
        id: terraform
        shell: bash
        run: |
          count=$(find infra -type f -name "*.tf" | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -eq 0 ]; then
            echo "No Terraform files found under infra; Checkov will run automatically once IaC is added."
          fi

      - name: Checkov Terraform scan
        if: steps.terraform.outputs.count != '0'
        uses: bridgecrewio/checkov-action@v12.3114.0
        with:
          directory: infra
          framework: terraform
          output_format: cli
          quiet: true
          soft_fail: false
